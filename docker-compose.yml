version: "3.9"

services:

  postgres:
    image: postgres:15
    container_name: marketing_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: marketing_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  pipeline:
    build: .
    container_name: marketing_pipeline
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_NAME: marketing_db
      DB_USER: postgres
      DB_PASSWORD: postgres
    command: python -m app.main

  metabase:
    image: metabase/metabase
    container_name: marketing_metabase
    ports:
      - "3001:3000"
    depends_on:
      - postgres

volumes:
  postgres_data: